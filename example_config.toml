[audio]
device = "default"
sample_rate = 16000
channels = 1

[whisper]
# Provider selection (defaults to auto-detection if not specified)
# Uncomment and set provider to explicitly choose:
# provider = "whisper-cpp"    # Local whisper.cpp (built during install)
# provider = "whisper-rs"     # In-process whisper.cpp bindings
# provider = "openai-cli"     # Local OpenAI Whisper CLI 
# provider = "openai-api"     # OpenAI API (requires api_key)

# Common settings
model = "base"              # Model size: tiny, base, small, medium, large-v3, large-v3-turbo
language = "en"             # Language code (en, es, fr, de, etc.)

# Optional local whisper speed/reliability settings
# threads = 1                # Try 1 or 2 on older/smaller CPUs; benchmark on your machine
# beam_size = 1              # Lower is faster; higher may improve difficult audio
# best_of = 1                # Lower is faster; higher explores more candidates
# no_fallback = true         # Faster, but less robust for noisy/ambiguous audio
# timeout_secs = 120         # Kill transcription if whisper.cpp wedges

# whisper-rs settings (used when provider = "whisper-rs")
# model = "base.en"                         # Prefers ggml-base.en-q5_0.bin when present
# keep_warm_for_secs = 0                    # 0 (default) unloads after each recording; positive values retain the model between recordings
# audio_ctx = "auto"                        # auto = shrink encoder context per clip; 0/"off" = full 30s window; integer = explicit context
# initial_prompt = "Transcribe concise technical dictation."
# coding_vocabulary = "Rust, Axum, Tokio, whisper-rs, ChezWizper"

# whisper.cpp settings (used when provider = "whisper-cpp")
# command_path = "/path/to/whisper-cli"  # Optional custom path
# model_path = "/path/to/model.bin"      # Optional custom model path

# OpenAI CLI settings (used when provider = "openai-cli")
# command_path = "/path/to/whisper"      # Optional custom path

# OpenAI API settings (used when provider = "openai-api")
# api_key = "sk-your-key"                # Required for API
# model = "whisper-1"                    # API model name
# api_endpoint = "https://api.openai.com/v1/audio/transcriptions"  # Optional

[vad]
# VAD runs after PTT release and before the WAV is written. It never stops a
# recording early; it only trims leading/trailing silence or skips no-speech clips.
enabled = true
# auto = use Silero when a real model is installed, otherwise amplitude fallback.
# Valid values: "auto", "silero", "amplitude"
engine = "auto"
# Amplitude fallback threshold. Raise to reject more background noise; lower for quiet speech.
threshold = 0.02
# Ignore shorter bursts as noise.
min_speech_ms = 100
# Keep padding around detected speech so word starts/endings are not clipped.
pad_ms = 200
# Silero speech-probability threshold (0.0-1.0) — a separate scale from the
# amplitude `threshold` above. Lower keeps quieter/uncertain speech.
# silero_threshold = 0.5
# Optional Silero model override. The tiny for-tests model can exercise the path,
# but normal auto-detection expects ggml-silero-v5.1.2.bin (from download-vad-model.sh).
# model_path = "/home/you/.local/share/chezwizper/whisper/models/ggml-silero-v5.1.2.bin"

[chunking]
# Experimental whisper-rs mode: transcribe completed speech segments during
# natural pauses, then stitch and inject once when recording stops.
enabled = false
# A pause this long makes an eligible segment ready for background transcription.
pause_ms = 600
# Avoid repeatedly paying Whisper's minimum encoder context for tiny chunks.
min_chunk_ms = 5000
# Audio retained across segment boundaries; clamped to pause_ms.
overlap_ms = 300

[ui]
indicator_position = "top-right"
indicator_size = 20
show_notifications = true
layer_shell_anchor = "top | right"
layer_shell_margin = 10
notification_color = "rgb(ff1744)"  # Hyprland notification color

[ui.waybar]
idle_text = "󰑊"                # Icon shown when idle (ready to record) - Nerd Font
recording_text = "󰻃"           # Icon shown when recording - Nerd Font
processing_text = "󰦖"          # Icon shown when processing - Nerd Font
idle_tooltip = "Press Super+R to record"
recording_tooltip = "Recording... Press Super+R to stop"
processing_tooltip = "Processing transcription..."

[api]
port = 3737                 # Local HTTP API port (toggle/status endpoints)

[wayland]
input_method = "wtype"
use_hyprland_ipc = true

[injection]
# Single-line text is typed directly so application-specific paste shortcuts
# cannot swallow a transcript. Multiline text uses a guarded paste transaction.
# Optional: force_method = "type" or "paste"
# force_method = "paste"
# Restore is best-effort for plain text; wl-clipboard/X11 tools cannot perfectly
# preserve rich, image, file, or clipboard-manager state.
restore_clipboard = true

[behavior]
auto_paste = true
preserve_clipboard = false
delete_audio_files = true
audio_feedback = true
